<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Big Bosket</title>
<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
<link rel="shortcut icon" href="favicon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
<link rel="manifest" href="favicon/site.webmanifest">
<link rel="stylesheet" href="css/style.css">
<style>


    .page-header{
        background: #0c3321;
        color: white;
        text-align: center;
        padding: 40px 20px;
    }

    .page-header h1{
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .page-header p{
        font-size: 1.1rem;
        margin-bottom: 0;
    }

    .container{
        max-width: 700px;
        margin: 40px auto;
        padding: 40px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .contact-info{
        background: #f8f1ed;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 30px;
    }

    .contact-info p{
        margin: 10px 0;
        font-size: 1.1rem;
        color: #555;
    }

    .container input, .container textarea{
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
    }

    .container input:focus, .container textarea:focus{
        outline: none;
        border-color: #1f4d3c;
        box-shadow: 0 0 5px rgba(31, 77, 60, 0.3);
    }

    button{
        background: #1f4d3c;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
        width: 100%;
    }

    button:hover{
        background: #0c3321;
        transform: translateY(-2px);
    }

    .back-btn{
        display: inline-block;
        margin-top: 30px;
        text-decoration: none;
        color: #1f4d3c;
        font-weight: bold;
        font-size: 16px;
        transition: 0.3s;
    }

    .back-btn:hover{
        color: #0c3321;
    }

    @media (max-width: 768px){
        .page-header h1{
            font-size: 2rem;
        }

        .container{
            margin: 20px;
            padding: 30px 20px;
        }

        input, textarea{
            font-size: 16px; /* Prevents zoom on iOS */
        }
    }
</style>
</head>

<body class="body">
    <div id="header-container"></div>
    <script src="js/search.js"></script>
    <script src="js/wishlist-utils.js"></script>
    <script src="js/cart-utils.js"></script>
    <script src="js/layout.js"></script>

    <section class="page-header">
        <h1 style="font-family: Verdana, Geneva, Tahoma, sans-serif;">Contact Us</h1>
        <p>Get in touch with our team</p>
    </section>

    <div class="container">
        <div class="contact-info">
            <p><strong>Email:</strong> support@bigbosket.com</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Hours:</strong> Mon-Sat 9AM-8PM</p>
        </div>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

    <div id="footer-container"></div>
    <script src="js/layout.js"></script>
</body>
</html>
