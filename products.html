<!DOCTYPE html>
<html>
<head>
    <title>Food Products - Big Bosket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
    <style>

        .page-header{
            text-align: center;
            padding: 80px 20px;
            background:
                linear-gradient(
                    rgba(40, 40, 40, 0.5),
                    rgba(40, 40, 40, 0.5)
                ),
                url("public/products.jpg");

            background-size: cover;
            background-position: center;
        }

        .page-header h1{
            font-size: 2.5rem;
            margin-bottom: 10px;
            color:white;
            
        }

        .page-header p{
            font-size: 1.1rem;
            margin-bottom: 0;
            color:white;
        }

        .controls{
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px 0;
            border-bottom: 1px solid #ddd;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls select{
            border: none;
            background: transparent;
            font-size: 16px;
            color: #555;
            cursor: pointer;
            padding: 10px;
        }

        .controls select:focus{
            outline: none;
        }

        #productContainer{
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 0 40px 40px;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card{
            width: 280px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover{
            transform: translateY(-8px);
        }

        .card img{
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card h3{
            margin: 15px 0 10px;
            font-size: 24px;
            color: #333;
        }

        .card p{
            margin: 10px 0;
            color: #666;
        }

        .card .price{
            color: #2e7d32;
            font-size: 22px;
            font-weight: bold;
        }

        .card .rating{
            color: #ffb300;
            font-weight: bold;
        }

        @media (max-width: 768px){
            .page-header h1{
                font-size: 2rem;
            }
            .controls{
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }

            .controls select{
                width: 200px;
            }

            #productContainer{
                padding: 0 20px 40px;
                gap: 20px;
            }

            .card{
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body class="body">
    <div id="header-container"></div>
    <script src="js/search.js"></script>
    <script src="js/wishlist-utils.js"></script>
    <script src="js/cart-utils.js"></script>
    <script src="js/layout.js"></script>

    <section class="page-header">
        <h1 style="font-size: 2.5rem;font-family: Verdana, Geneva, Tahoma, sans-serif;font-weight:bolder;">Products</h1>
        <p>Fresh groceries, fruits, vegetables and daily essentials</p>
    </section>

    <div class="controls">
        <select id="ratingFilter">
            <option value="0">All Ratings</option>
            <option value="4">4★ & Above</option>
            <option value="3">3★ & Above</option>
        </select>

        <select id="sortSelect">
            <option value="">Sort By</option>
            <option value="low">Price Low to High</option>
            <option value="high">Price High to Low</option>
        </select>
        
        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="Fruits">Fruits</option>
            <option value="Vegetables">Vegetables</option>
            <option value="Dairy">Dairy</option>
            <option value="Bakery">Bakery</option>
            <option value="Beverages">Beverages</option>
            <option value="Snacks">Snacks</option>
        </select>
    </div>

    <div id="productContainer"></div>
    <script src="js/products.js"></script>

    <div id="footer-container"></div>
    <script src="js/layout.js"></script>

</body>
</html>
